<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nathan Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #000;
  color: white;
}

/* ===== BANNER ===== */
.banner {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 320px;

  background:
    linear-gradient(to bottom, rgba(0,0,0,0) 20%, rgba(0,0,0,0.95)),
    url('assets/banner.jpg');

  background-size: cover;
  background-position: center;
}

/* ===== LOGO ===== */
.logo {
  position: absolute;
  top: 3px;
  left: 10px;
}

.logo img {
  width: 110px;
  filter: drop-shadow(0 0 12px rgba(30,144,255,0.7));
}

/* ===== CONTENT (FIXED POSITION) ===== */
.content {
  margin-top: -20px; /* sudah diturunkan biar tidak ketutup */
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 0 20px;
}

.username {
  font-size: 22px;
  font-weight: 600;
  background: linear-gradient(90deg, #1e90ff, #00c6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow: 0 0 10px rgba(30,144,255,0.4);
}


/* BIO */
.desc {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}

/* ===== LINKS ===== */
.links {
  margin-top: 70px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

/* ===== CARD ===== */
.card {
  display: flex;
  align-items: center;
  padding: 16px;
  border-radius: 14px;
  text-decoration: none;
  color: white;

  background: linear-gradient(145deg, #0a0f2c, #000000);
  border: 1px solid rgba(30,144,255,0.3);

  box-shadow:
    0 0 15px rgba(30,144,255,0.15),
    inset 0 0 10px rgba(255,255,255,0.05);

  backdrop-filter: blur(8px);
  transition: all 0.25s ease;
}

.card i {
  font-size: 24px;
  width: 40px;
  color: #1e90ff;
}

.card span {
  flex: 1;
  text-align: center;
  font-weight: 500;
}

/* HOVER */
.card:hover {
  transform: translateY(-4px) scale(1.02);
  border: 1px solid #1e90ff;

  box-shadow:
    0 0 25px rgba(30,144,255,0.6),
    inset 0 0 12px rgba(255,255,255,0.1);
}

/* CLICK */
.card:active {
  transform: scale(0.97);
  box-shadow:
    inset 0 0 15px rgba(30,144,255,0.7);
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 80px;
  padding: 40px 20px 30px;
  text-align: center;

  background: linear-gradient(
    to top,
    rgba(30,144,255,0.35),
    rgba(30,144,255,0.1),
    rgba(0,0,0,0)
  );
}

.footer p {
  font-size: 13px;
  opacity: 0.7;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(30,144,255,0.4);
}
</style>
</head>

<body>

<!-- ===== BANNER ===== -->
<div class="banner">
  <div class="logo">
    <img src="assets/logo.png" alt="Logo Nathan Studio">
  </div>
</div>

<!-- ===== CONTENT ===== -->
<div class="content">

  <div class="username">@Nathan_Studio</div>
<br>
  <div class="desc">
    Kami bantu desain & cetak kebutuhanmu jadi lebih profesional.<br><br>
    Yuk, order sekarang!
  </div>

  <div class="links">

    <a href="https://wa.me/message/AONI42QS3ACVG1" class="card">
      <i class="fab fa-whatsapp"></i>
      <span>whatsapp business </span>
    </a>

    <a href="https://www.instagram.com/nthn_std?igsh=MXk2emJscTc2bWUw" class="card">
      <i class="fab fa-instagram"></i>
      <span>Instagram</span>
    </a>

    <a href="https://www.tiktok.com/@nathan.studio_?_r=1&_t=ZS-95cObdA5yU6" class="card">
      <i class="fab fa-tiktok"></i>
      <span>TikTok</span>
    </a>

  </div>

</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
  <p>© 2026 Nathan Studio</p>
</div>

</body>
</html>
